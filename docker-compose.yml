services:
  postgres:
    image: postgres:16-alpine
    container_name: runegames_postgres
    environment:
      POSTGRES_USER: runegames
      POSTGRES_PASSWORD: runegames123
      POSTGRES_DB: runegames_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: runegames_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
